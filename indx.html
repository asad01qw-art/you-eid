<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Special Someone ❤️</title>
    <style>
        /* CSS: Yahan Design aur 3D Animation hai */
        body {
            background: radial-gradient(circle, #ffafbd, #ffc3a0);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            flex-direction: column;
        }

        .container {
            text-align: center;
            perspective: 1000px;
        }

        /* 3D Heart Styling */
        .heart-box {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 60px;
            transform-style: preserve-3d;
            animation: rotate3d 6s infinite linear;
        }

        .heart-3d {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #ff0040;
            transform: rotate(-45deg);
            box-shadow: -10px 10px 50px rgba(0,0,0,0.2);
        }

        .heart-3d::before,
        .heart-3d::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #ff0040;
            border-radius: 50%;
        }

        .heart-3d::before {
            top: -50px;
            left: 0;
        }

        .heart-3d::after {
            top: 0;
            left: 50px;
        }

        /* 3D Rotation Animation */
        @keyframes rotate3d {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            50% { transform: rotateY(180deg) rotateX(20deg); }
            100% { transform: rotateY(360deg) rotateX(0deg); }
        }

        h1 {
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .btn-surprise {
            padding: 15px 30px;
            font-size: 18px;
            background: white;
            color: #ff0040;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .btn-surprise:hover {
            transform: scale(1.1);
            background: #ff0040;
            color: white;
        }

        /* Secret Message Style */
        #message-box {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            color: #c9184a;
            max-width: 300px;
            animation: fadeIn 1.5s ease-in-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Floating particles background effect */
        .particle {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-box">
            <div class="heart-3d"></div>
        </div>

        <h1>Hello Beautiful! ✨</h1>
        
        <button class="btn-surprise" id="revealBtn" onclick="showSurprise()">Click for Surprise</button>

        <div id="message-box">
            <h3>You are My Everything! ❤️</h3>
            <p>Har din tumhare saath ek nayi khushi lekar aata hai. Shukriya meri life mein aane ke liye!</p>
            <p><strong>Forever Yours. 🥂</strong></p>
        </div>
    </div>

    <script>
        // JavaScript: Interactivity aur Background Effects
        function showSurprise() {
            // Button hide karein aur message dikhayein
            document.getElementById('revealBtn').style.display = 'none';
            document.getElementById('message-box').style.display = 'block';

            // Heart ki animation fast kar dein
            document.querySelector('.heart-box').style.animationDuration = '1.5s';

            // Background mein dher saare dil (particles) udayein
            createParticles();
        }

        function createParticles() {
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerHTML = '❤️';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = '100vh';
                particle.style.fontSize = (Math.random() * 20 + 10) + 'px';
                particle.style.opacity = Math.random();
                
                document.body.appendChild(particle);

                // Animation for floating up
                const duration = Math.random() * 3 + 2;
                particle.animate([
                    { transform: 'translateY(0)' },
                    { transform: `translateY(-110vh) rotate(${Math.random() * 360}deg)` }
                ], {
                    duration: duration * 1000,
                    easing: 'linear'
                });

                // Remove particle after animation
                setTimeout(() => particle.remove(), duration * 1000);
            }
        }
    </script>

</body>
</html>
